<!DOCTYPE html>
<html lang="tr">

<head>
 <meta charset="UTF-8" />
 <meta name="viewport" content="width=device-width, initial-scale=1.0" />
 <title>Hearthstone Pack Tracker</title>
</head>

<body>
 <div class="container">
  <div id="startScreen" class="card">
   <h2>Yeni Session</h2>
   <select id="playerSelect">
<option value="Hande">Hande</option>
<option value="Birand">Birand</option>
</select>
   <input type="date" id="dateInput" />
   <input type="text" id="expansionInput" placeholder="Expansion adı" />
   <button onclick="startSession()">Başla</button>
  </div>
  <div id="sessionScreen" style="display:none;">
   <div class="card">
    <h3 id="sessionInfo"></h3>
    <div class="counter" id="counter">0</div>
    <button class="pack-btn" onclick="addPack()">Pack Aç</button>
    <button onclick="undoPack()">➖ Geri Al</button>
    <button class="legend-btn" onclick="confirmLegend()">Legendary Geldi</button>
    <br/>
    <button class="save-btn" onclick="saveSession()">Save Session</button>
    <button onclick="goHome()">İptal</button>
   </div>
  </div>
  <div class="card">
   <h3>History</h3>
   <button onclick="exportData()">Export</button>
   <button onclick="importData()">Import</button>
   <button class="danger-btn" onclick="clearAll()">Clear All</button>
   <div id="history"></div>
  </div>
 </div>
</body>

<style>body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(180deg, #1e2a38, #243447);
  color: #fff;
  text-align: center;
}

.container {
  padding: 20px;
  max-width: 500px;
  margin: auto;
}

.card {
  background: #2f3e4e;
  padding: 20px;
  border-radius: 16px;
  margin-bottom: 20px;
  box-shadow: 0 0 20px rgba(255, 215, 0, 0.15);
}

button {
  padding: 14px 20px;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  margin: 8px;
  cursor: pointer;
}

.pack-btn {
  background: linear-gradient(45deg, #d4af37, #f5d76e);
  color: #000;
  font-weight: bold;
}

.legend-btn {
  background: linear-gradient(45deg, #7b3fbf, #a86bd6);
  color: #fff;
}

.save-btn {
  background: #4caf50;
  color: white;
}

.danger-btn {
  background: #c0392b;
  color: white;
}

input, select {
  padding: 10px;
  border-radius: 8px;
  border: none;
  margin: 8px;
  width: 90%;
}

.counter {
  font-size: 64px;
  margin: 20px 0;
  color: #f5d76e;
}

.history-block {
  text-align: left;
  background: #2f3e4e;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 15px;
}

.small {
  font-size: 14px;
  opacity: 0.8;
}html{
 color:darkviolet;
 font-size:25px;
 font-weight:600;
}</style><script>let totalPacks = 0;
let streak = 0;
let legendaryHits = [];
let currentPlayer = "";
let currentDate = "";
let currentExpansion = "";

document.getElementById("dateInput").valueAsDate = new Date();

function startSession() {
  currentPlayer = document.getElementById("playerSelect").value;
  currentDate = document.getElementById("dateInput").value;
  currentExpansion = document.getElementById("expansionInput").value.trim();

  if (!currentExpansion) {
    alert("Expansion adı giriniz.");
    return;
  }

  const data = getData();
  if (data.find(e => e.player === currentPlayer && e.date === currentDate && e.expansion === currentExpansion)) {
    alert("Bu expansion için zaten kayıt mevcut.");
    return;
  }

  totalPacks = 0;
  streak = 0;
  legendaryHits = [];

  document.getElementById("startScreen").style.display = "none";
  document.getElementById("sessionScreen").style.display = "block";
  document.getElementById("sessionInfo").innerText =
    currentPlayer + " - " + currentDate + " - " + currentExpansion;
  updateCounter();
}

function addPack() {
  totalPacks++;
  streak++;
  updateCounter();
}

function confirmLegend() {
  if (streak === 0) return;
  if (!confirm("Legendary geldiğine emin misin?")) return;

  legendaryHits.push(streak);
  streak = 0;
  updateCounter();
}

function updateCounter() {
  document.getElementById("counter").innerText = streak;
}

function saveSession() {
  if (legendaryHits.length === 0) {
    if (!confirm("Hiç legendary yok. Yine de kaydedilsin mi?")) return;
  }

  const avg = legendaryHits.length > 0
    ? (totalPacks / legendaryHits.length).toFixed(2)
    : "-";

  const entry = {
    player: currentPlayer,
    date: currentDate,
    expansion: currentExpansion,
    totalPacks: totalPacks,
    legendaryHits: legendaryHits,
    legendaryCount: legendaryHits.length,
    averagePerLegendary: avg
  };

  const data = getData();
  data.push(entry);
  localStorage.setItem("hsData", JSON.stringify(data));

  goHome();
  renderHistory();
}

function goHome() {
  document.getElementById("sessionScreen").style.display = "none";
  document.getElementById("startScreen").style.display = "block";
}

function getData() {
  return JSON.parse(localStorage.getItem("hsData") || "[]");
}

function renderHistory() {
  const historyDiv = document.getElementById("history");
  const rawData = getData();
  const data = [...rawData].sort((a,b) => new Date(b.date) - new Date(a.date));

  historyDiv.innerHTML = "";

  data.forEach((entry, index) => {
    const block = document.createElement("div");
    block.className = "history-block";

    block.innerHTML = `
      <strong>${entry.date} - ${entry.expansion}</strong><br/>
      ${entry.player}<br/>
      Pack: ${entry.totalPacks}<br/>
      Legendary: ${entry.legendaryCount}<br/>
      ${entry.averagePerLegendary} pack'te 1<br/>
      <span class="small">Hits: ${entry.legendaryHits.join(", ")}</span><br/>
      <button onclick="deleteEntry(${index})">Sil</button>
    `;

    historyDiv.appendChild(block);
  });
}

function deleteEntry(index) {
  if (!confirm("Silmek istediğine emin misin?")) return;

  const rawData = getData();
  const sortedData = [...rawData].sort((a,b) => new Date(b.date) - new Date(a.date));
  const entryToDelete = sortedData[index];

  const updatedData = rawData.filter(e =>
    !(e.player === entryToDelete.player &&
      e.date === entryToDelete.date &&
      e.expansion === entryToDelete.expansion)
  );

  localStorage.setItem("hsData", JSON.stringify(updatedData));
  renderHistory();
}

function undoPack() {
  if (streak > 0) {
    streak--;
    totalPacks--;
    updateCounter();
  }
}

function clearAll() {
  if (!confirm("Tüm veriler silinsin mi?")) return;
  localStorage.removeItem("hsData");
  renderHistory();
}

function exportData() {
  const dataStr = JSON.stringify(getData(), null, 2);
  const blob = new Blob([dataStr], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "hearthstone_data.json";
  a.click();
}

function importData() {
  const input = document.createElement("input");
  input.type = "file";
  input.accept = "application/json";
  input.onchange = e => {
    const file = e.target.files[0];
    const reader = new FileReader();
    reader.onload = event => {
      localStorage.setItem("hsData", event.target.result);
      renderHistory();
    };
    reader.readAsText(file);
  };
  input.click();
}

renderHistory();/*Here write your javascript code*/</script></html>
