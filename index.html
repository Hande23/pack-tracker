<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hearthstone Pack Tracker</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pack Tracker">
<meta name="theme-color" content="#1e2a38">
<link rel="apple-touch-icon" href="icon.png">

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(180deg,#1e2a38,#243447);
  color:white;
  text-align:center;
}

.container {
  max-width:500px;
  margin:auto;
  padding:20px;
}

.card {
  background:#2f3e4e;
  padding:20px;
  border-radius:16px;
  margin-bottom:20px;
}

button {
  padding:14px 20px;
  border:none;
  border-radius:12px;
  margin:6px;
  font-size:16px;
}

.pack-btn {background:#d4af37;color:black;font-weight:bold;}
.legend-btn {background:#8e44ad;color:white;}
.save-btn {background:#4caf50;color:white;}
.undo-btn {background:#7f8c8d;color:white;}

.counter {
  font-size:64px;
  color:#f5d76e;
}

.history-expansion {
  background:#34495e;
  padding:12px;
  border-radius:10px;
  margin-top:10px;
  cursor:pointer;
}

.history-content {
  display:none;
  background:#2f3e4e;
  padding:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h2>New Session</h2>

<select id="player">
<option>Hande</option>
<option>Birand</option>
</select>

<input id="expansion" placeholder="Expansion name">

<button onclick="startOpening()">New Opening</button>
<button onclick="continueOpening()">Continue Opening</button>

</div>

<div class="card" id="session" style="display:none">

<h3 id="sessionTitle"></h3>

<div class="counter" id="counter">0</div>

<button class="pack-btn" onclick="addPack()">Pack Aç</button>
<button class="undo-btn" onclick="undoPack()">Undo</button>
<button class="legend-btn" onclick="legendaryPopup()">Legendary</button>

</div>

<div class="card">
<h3>History</h3>
<div id="history"></div>
</div>

</div>

<!-- Legendary popup -->
<div id="legendPopup" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#0009">
<div style="background:#2f3e4e;padding:20px;margin:200px auto;width:300px;border-radius:10px">
Legendary geldi mi?
<br><br>
<button onclick="confirmLegend()">Evet</button>
<button onclick="closePopup()">Hayır</button>
</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
getDocs,
updateDoc,
doc,
query,
where
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyC6kVp7UC2SzYzv4oRY1n9u42O1O86031w",
authDomain: "hearthstone-pack-tracker-33dbf.firebaseapp.com",
projectId: "hearthstone-pack-tracker-33dbf",
storageBucket: "hearthstone-pack-tracker-33dbf.firebasestorage.app",
messagingSenderId: "76467697999",
appId: "1:76467697999:web:72f24b7d4fbf2c0d12ad3a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let totalPacks=0;
let streak=0;
let hits=[];
let openingPacks=0;
let openingHits=[];
let currentDocId=null;

function startOpening(){
totalPacks=0;
streak=0;
hits=[];
openingHits=[];
openingPacks=0;

document.getElementById("session").style.display="block";

document.getElementById("sessionTitle").innerText=
document.getElementById("player").value+
" - "+
document.getElementById("expansion").value;
}

async function continueOpening(){

const player=document.getElementById("player").value;
const expansion=document.getElementById("expansion").value;

const q=query(collection(db,"sessions"),
where("player","==",player),
where("expansion","==",expansion));

const querySnapshot=await getDocs(q);

querySnapshot.forEach((docu)=>{

const d=docu.data();

totalPacks=d.totalPacks;
streak=d.currentStreak;
hits=d.streakHits;
openingHits=d.openingHits;
openingPacks=d.openingPacks;

currentDocId=docu.id;

document.getElementById("session").style.display="block";
document.getElementById("sessionTitle").innerText=player+" - "+expansion;
updateCounter();

});

}

function addPack(){
totalPacks++;
streak++;
updateCounter();
}

function undoPack(){
if(streak>0){
streak--;
totalPacks--;
updateCounter();
}
}

function updateCounter(){
document.getElementById("counter").innerText=streak;
}

function legendaryPopup(){
document.getElementById("legendPopup").style.display="block";
}

function closePopup(){
document.getElementById("legendPopup").style.display="none";
}

async function confirmLegend(){

hits.push(streak);

if(openingPacks===0){
openingHits.push(streak);
}

streak=0;
updateCounter();

document.getElementById("legendPopup").style.display="none";

await saveSession();
}

async function saveSession(){

const player=document.getElementById("player").value;
const expansion=document.getElementById("expansion").value;

if(openingPacks===0){
openingPacks=totalPacks;
}

const data={
player:player,
expansion:expansion,
totalPacks:totalPacks,
currentStreak:streak,
streakHits:hits,
openingHits:openingHits,
openingPacks:openingPacks
};

if(currentDocId){
await updateDoc(doc(db,"sessions",currentDocId),data);
}else{
const docRef=await addDoc(collection(db,"sessions"),data);
currentDocId=docRef.id;
}

loadHistory();
}

async function loadHistory(){

const history=document.getElementById("history");
history.innerHTML="";

const querySnapshot=await getDocs(collection(db,"sessions"));

querySnapshot.forEach((docu)=>{

const d=docu.data();

const div=document.createElement("div");
div.className="history-expansion";

div.innerText=d.expansion+" ▼";

const content=document.createElement("div");
content.className="history-content";

const openingLegend=d.openingHits.length;
const openingAvg=(d.openingPacks/openingLegend).toFixed(1);

const totalLegend=d.streakHits.length;
const totalAvg=(d.totalPacks/totalLegend).toFixed(1);

content.innerHTML=
`
<b>${d.player}</b><br><br>

Opening<br>
${d.openingPacks} pack<br>
${openingLegend} legendary<br>
${openingAvg} pack'te 1<br><br>

Total<br>
${d.totalPacks} pack<br>
${totalLegend} legendary<br>
${totalAvg} pack'te 1<br><br>

Hits<br>
${d.streakHits.join(",")}
`;

div.onclick=()=>{
content.style.display=
content.style.display==="block"?"none":"block";
};

history.appendChild(div);
history.appendChild(content);

});

}

loadHistory();

window.startOpening = startOpening;
window.continueOpening = continueOpening;
window.addPack = addPack;
window.undoPack = undoPack;
window.legendaryPopup = legendaryPopup;
window.confirmLegend = confirmLegend;
window.closePopup = closePopup;

</script>

</body>
</html>
