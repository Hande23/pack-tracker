<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hearthstone Pack Tracker</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1e2a38">

<link rel="apple-touch-icon" href="icon.png">

<style>

body{
background:linear-gradient(#1e2a38,#243447);
font-family:Arial;
color:white;
text-align:center;
margin:0;
}

.container{
max-width:500px;
margin:auto;
padding:20px;
}

.card{
background:#2f3e4e;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

button{
padding:12px 18px;
border:none;
border-radius:10px;
margin:6px;
font-size:16px;
cursor:pointer;
}

select{
padding:10px;
font-size:16px;
border-radius:8px;
margin:5px;
}

input{
padding:10px;
font-size:16px;
border-radius:8px;
margin:5px;
width:200px;
}

.pack{background:#d4af37;color:black}
.legend{background:#8e44ad;color:white}
.undo{background:#7f8c8d;color:white}
.save{background:#2ecc71;color:white}

.counter{
font-size:60px;
color:#f5d76e;
margin:20px 0;
}

.Header{
background:#34495e;
padding:10px;
border-radius:10px;
margin-top:10px;
cursor:pointer;
}

.Content{
display:none;
background:#2f3e4e;
padding:10px;
border-radius:10px;
margin-top:10px;
}

.playerTitle{
display:flex;
justify-content:space-between;
font-weight:bold;
margin-top:10px;
}

.delete{
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<button onclick="showNew()">New Opening</button>
<button onclick="showContinue()">Continue Opening</button>

<div id="newPanel" style="display:none">

<br>

<select id="player">
<option>Birand</option>
<option>Hande</option>
</select>

<br><br>

<input id="expansionInput" list="expansionList" placeholder="Expansion">
<datalist id="expansionList"></datalist>

<br><br>

<input type="date" id="dateInput">

<br><br>

<button onclick="startOpening()">Start</button>

</div>

<div id="continuePanel" style="display:none">

<br>

<select id="continuePlayer">
<option>Birand</option>
<option>Hande</option>
</select>

<br><br>

<select id="expansionSelect"></select>

<br><br>

<button onclick="continueOpening()">Continue</button>

</div>

</div>

<div id="sessionCard" class="card" style="display:none">

<h3 id="sessionTitle"></h3>

<div class="counter" id="counter">0</div>

<button class="pack" onclick="addPack()">Open Pack</button>
<button class="undo" onclick="undoPack()">Undo</button>
<button class="legend" onclick="legendaryPopup()">Legendary</button>
<button class="save" onclick="saveSession()">Save Progress</button>

</div>

<div class="card">

<h3>History</h3>

<button onclick="exportData()">Export</button>
<input type="file" id="importFile" style="display:none" onchange="importData(event)">
<button onclick="document.getElementById('importFile').click()">Import</button>

<div id="history"></div>

</div>

</div>

<script type="module">

import {initializeApp} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
updateDoc,
doc,
deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyC6kVp7UC2SzYzv4oRY1n9u42O1O86031w",
authDomain:"hearthstone-pack-tracker-33dbf.firebaseapp.com",
projectId:"hearthstone-pack-tracker-33dbf",
storageBucket:"hearthstone-pack-tracker-33dbf.firebasestorage.app",
messagingSenderId:"76467697999",
appId:"1:76467697999:web:72f24b7d4fbf2c0d12ad3a"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let totalPacks=0;
let currentStreak=0;
let hits=[];
let openingHits=[];

let currentDoc=null;

function showNew(){

totalPacks = 0;
currentStreak = 0;

document.getElementById("counter").innerText = 0;

document.getElementById("sessionCard").style.display="none";

document.getElementById("newPanel").style.display="block";
document.getElementById("continuePanel").style.display="none";

document.getElementById("expansionInput").value="";
document.getElementById("dateInput").value="";

}

function showContinue(){
document.getElementById("continuePanel").style.display="block";
document.getElementById("newPanel").style.display="none";
}

async function startOpening(){

const date = document.getElementById("dateInput").value;

if(date === "" || date === null){
alert("Please select a date first");
return;
}

const player = document.getElementById("player").value;
const expansion = document.getElementById("expansionInput").value;

const snapshot = await getDocs(collection(db,"sessions"));

let existsPlayer = false;
let wrongDate = false;

snapshot.forEach(docu=>{
const d = docu.data();

if(d.expansion === expansion && d.date !== date){
wrongDate = true;
}

if(d.player === player && d.expansion === expansion){
existsPlayer = true;
}

});

if(wrongDate || existsPlayer){
alert("This session already exists");
return;
}

totalPacks = 0;
currentStreak = 0;
hits = [];
openingHits = [];

document.getElementById("sessionCard").style.display="block";

document.getElementById("sessionTitle").innerText =
player + " — " + expansion;

const data = {
player,
expansion,
date,
hits: [],
openingHits: [],
currentStreak: 0
};

const ref = await addDoc(collection(db,"sessions"),data);
currentDoc = ref.id;

loadExpansions();

}

async function continueOpening(){

const expansion=document.getElementById("expansionSelect").value;
const player=document.getElementById("continuePlayer").value;

const snapshot=await getDocs(collection(db,"sessions"));

snapshot.forEach(docu=>{
const d=docu.data();

if(d.expansion===expansion && d.player===player){

currentDoc=docu.id;

hits=d.hits||[];
openingHits=d.openingHits||[];
currentStreak=d.currentStreak||0;

totalPacks=hits.reduce((a,b)=>a+b,0)+currentStreak;

document.getElementById("sessionCard").style.display="block";
document.getElementById("sessionTitle").innerText=d.player+" — "+d.expansion;

updateCounter();

}

});

}

function addPack(){
totalPacks++;
currentStreak++;

updateCounter();
}

async function undoPack(){

if(currentStreak>0){

currentStreak--;
totalPacks--;

updateCounter();

}

}

async function legendary(){

hits.push(currentStreak);

openingHits.push(currentStreak);

currentStreak=0;

updateCounter();

}

function legendaryPopup(){
if(confirm("Legendary geldi mi?")){
legendary();
}
}

function updateCounter(){

document.getElementById("counter").innerText=currentStreak;

}

async function save(){

if(!currentDoc) return;

await updateDoc(doc(db,"sessions",currentDoc),{
hits,
openingHits,
currentStreak: currentStreak
});

loadHistory();

}

async function saveSession(){

if(!currentDoc) return;

const snapshot = await getDocs(collection(db,"sessions"));

let openingTotalValue = totalPacks;

snapshot.forEach(docu=>{
if(docu.id === currentDoc){
const d = docu.data();
if(d.openingTotal){
openingTotalValue = d.openingTotal;
}
}
});

await updateDoc(doc(db,"sessions",currentDoc),{
hits: hits,
openingHits: openingHits,
currentStreak: currentStreak,
openingTotal: openingTotalValue
});

loadHistory();

alert("Progress saved");

}

async function loadHistory(){

const history=document.getElementById("history");
history.innerHTML="";

const snapshot=await getDocs(collection(db,"sessions"));

let data=[];

snapshot.forEach(d=>data.push({...d.data(),id:d.id}));

data.sort((a,b)=>new Date(b.date)-new Date(a.date));

let groups={};

data.forEach(d=>{
const key = d.date ? d.expansion + " (" + d.date + ")" : d.expansion;

if(!groups[key]) groups[key]=[];

groups[key].push(d);

});

Object.keys(groups).forEach(key=>{

const head=document.createElement("div");
head.className="historyHeader";
head.innerText=key+" ▼";

const content=document.createElement("div");
content.className="historyContent";
content.style.display="none";

groups[key].sort((a,b)=>{
if(a.player==="Birand") return -1;
if(b.player==="Birand") return 1;
return 0;
});

groups[key].forEach(d=>{

const hitsSum=(d.hits || []).reduce((a,b)=>a+b,0);
const current = d.currentStreak || 0;
const total = hitsSum + current;

const openingLegend=d.openingHits.length;
const openingTotal = d.openingTotal || 0;
const openingAvg = openingLegend ? (openingTotal / openingLegend).toFixed(1) : "-";

const totalLegend=d.hits.length;
const totalAvg = totalLegend ? (total / totalLegend).toFixed(1) : "-";

const block=document.createElement("div");

block.innerHTML=`

<div class="playerTitle">
${d.player}
<span class="delete" onclick="deletePlayer('${d.id}')">🗑️</span>
</div>

Opening<br>
${d.openingTotal || hitsSum} pack<br>
${openingLegend} legendary<br>
${openingAvg} pack'te 1<br><br>

Total<br>
${total} pack<br>
${totalLegend} legendary<br>
${totalAvg} pack'te 1<br><br>

Current streak<br>
${d.currentStreak||0} pack<br><br>

Hits<br>
${(d.hits || []).join(",")}

<hr>
`;

content.appendChild(block);

});

head.onclick=()=>{

content.style.display=
content.style.display==="block"?"none":"block";

};

history.appendChild(head);
history.appendChild(content);

});

}

async function deletePlayer(id){

if(!confirm("Are you sure you want to delete this session?")) return;

await deleteDoc(doc(db,"sessions",id));

loadHistory();
loadExpansions();

}

async function exportData(){

const snapshot = await getDocs(collection(db,"sessions"));

let data=[];

snapshot.forEach(doc=>{
data.push({...doc.data(), id:doc.id});
});

const blob = new Blob(
[JSON.stringify(data,null,2)],
{type:"application/json"}
);

const a=document.createElement("a");

a.href=URL.createObjectURL(blob);
a.download="packtracker_backup.json";

a.click();

}

async function importData(event){

const file = event.target.files[0];

if(!file) return;

const text = await file.text();

const data = JSON.parse(text);

for(const d of data){

await addDoc(collection(db,"sessions"),{
player:d.player,
expansion:d.expansion,
date:d.date,
hits:d.hits||[],
openingHits:d.openingHits||[],
currentStreak:d.currentStreak||0,
openingTotal:d.openingTotal||0
});

}

loadHistory();
loadExpansions();

alert("Import completed");

}

async function loadExpansions(){

const dataList = document.getElementById("expansionList");
dataList.innerHTML="";

const player = document.getElementById("continuePlayer").value;
const select = document.getElementById("expansionSelect");

select.innerHTML="";

const snapshot = await getDocs(collection(db,"sessions"));

let expansions=[];

snapshot.forEach(doc=>{
const d = doc.data();

expansions.push(d.expansion);

});

expansions=[...new Set(expansions)];

expansions.reverse();

expansions.forEach(e=>{
const opt=document.createElement("option");
opt.value=e;
opt.text=e;
select.appendChild(opt);
});

expansions.forEach(e=>{
const opt=document.createElement("option");
opt.value=e;
dataList.appendChild(opt);
});

}

loadHistory();
loadExpansions();

window.startOpening=startOpening;
window.continueOpening=continueOpening;
window.addPack=addPack;
window.undoPack=undoPack;
window.legendary=legendary;
window.legendaryPopup=legendaryPopup;
window.deletePlayer=deletePlayer;
window.showNew=showNew;
window.showContinue=showContinue;
window.saveSession = saveSession;
window.exportData = exportData;
window.importData = importData;
document.getElementById("continuePlayer").addEventListener("change",loadExpansions);

</script>

</body>
</html>
